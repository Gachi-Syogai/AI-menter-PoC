<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Business Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');

:root {
  /* Core palette — obsidian luxury */
  --bg:      #07080c;
  --bg2:     #0d0f15;
  --bg3:     #131620;
  --bg4:     #191d2a;
  --border:  rgba(255,255,255,0.055);
  --border2: rgba(255,255,255,0.10);
  --border3: rgba(255,255,255,0.16);

  /* Typography */
  --text:    #eceef4;
  --text2:   #7c8299;
  --text3:   #454a60;
  --text4:   #2e3246;

  /* Accents — warm champagne gold + cool teal */
  --gold:    #c9a96e;
  --gold2:   #e8c98a;
  --gold3:   rgba(201,169,110,0.12);
  --teal:    #4fd1c5;
  --teal2:   #81e6d9;
  --teal3:   rgba(79,209,197,0.10);
  --red:     #fc5c5c;
  --red2:    #ff8080;
  --blue:    #5b9bd5;
  --orange:  #e8955a;
  --orange2: rgba(232,149,90,0.12);

  /* Glow */
  --glow-gold: 0 0 24px rgba(201,169,110,0.18);
  --glow-teal: 0 0 24px rgba(79,209,197,0.15);

  /* Radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;

  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 10% -10%, rgba(201,169,110,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 110%, rgba(79,209,197,0.04) 0%, transparent 55%);
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  opacity: 0.4;
}

.wrap, .header-wrap, .module-panel { position: relative; z-index: 1; }

/* ── Header ── */
.header-wrap {
  border-bottom: 1px solid var(--border);
  background: rgba(7,8,12,0.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  position: sticky; top: 0; z-index: 100;
  padding: 0 2rem;
}
.header-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 30px; height: 30px; border-radius: 9px;
  background: linear-gradient(135deg, var(--gold), rgba(201,169,110,0.6));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; box-shadow: var(--glow-gold);
}
.logo-text {
  font-size: 14px; font-weight: 600;
  letter-spacing: -0.01em; color: var(--text);
}
.badge-m1 {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--gold); background: var(--gold3);
  border: 1px solid rgba(201,169,110,0.25);
  padding: 3px 8px; border-radius: 6px; letter-spacing: 0.06em;
}
.badge-m2 {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--teal); background: var(--teal3);
  border: 1px solid rgba(79,209,197,0.2);
  padding: 3px 8px; border-radius: 6px; letter-spacing: 0.06em;
}

/* ── Nav tabs ── */
.nav-tab {
  padding: 7px 16px; border-radius: var(--r-sm);
  border: 1px solid transparent; background: transparent;
  font-size: 13px; font-weight: 500; cursor: pointer;
  color: var(--text3); font-family: var(--font);
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: -0.01em;
}
.nav-tab:hover { color: var(--text2); background: var(--bg3); border-color: var(--border); }
.nav-tab.active { color: var(--text); background: var(--bg3); border-color: var(--border2); }

/* ── Module panels ── */
.module-panel { display: none; }
.module-panel.visible { display: block; }

/* ── Wrap ── */
.wrap { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }

/* ── Step bar ── */
.step-bar { display: flex; align-items: center; margin-bottom: 3rem; }
.sc {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  font-family: var(--mono); transition: all 0.3s;
}
.sc.done {
  background: linear-gradient(135deg, var(--teal), rgba(79,209,197,0.7));
  color: #07080c; box-shadow: var(--glow-teal);
}
.sc.active {
  background: linear-gradient(135deg, var(--gold), rgba(201,169,110,0.8));
  color: #07080c; box-shadow: var(--glow-gold);
}
.sc.idle {
  background: var(--bg3); color: var(--text4);
  border: 1px solid var(--border);
}
.sl { font-size: 13px; font-weight: 500; color: var(--text3); }
.sl.active { color: var(--text); }
.sl.done { color: var(--teal); }
.step-line { flex: 1; height: 1px; background: var(--border); margin: 0 14px; }

/* ── Section headers ── */
.sec-title {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 6px;
}
.sec-sub { font-size: 13px; color: var(--text3); margin-bottom: 18px; line-height: 1.65; }

/* ── Drop zone ── */
.dz {
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: var(--r-lg); padding: 2.25rem; text-align: center;
  cursor: pointer; background: var(--bg2);
  margin-bottom: 10px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative; overflow: hidden;
}
.dz::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 100%, rgba(201,169,110,0.06), transparent 70%);
  opacity: 0; transition: opacity 0.25s;
}
.dz:hover { border-color: rgba(201,169,110,0.3); }
.dz:hover::after { opacity: 1; }
.dz.active { border-color: var(--teal); background: rgba(79,209,197,0.04); }
.dz-icon { font-size: 28px; margin-bottom: 10px; }
.dz-title { font-size: 14px; font-weight: 500; margin-bottom: 5px; color: var(--text); }
.dz-sub { font-size: 12px; color: var(--text3); }

/* ── Buttons ── */
.btn {
  width: 100%; padding: 13px; border-radius: var(--r-md);
  border: none; font-size: 13px; font-weight: 600;
  cursor: pointer; margin-bottom: 1.5rem;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  font-family: var(--font); letter-spacing: -0.01em;
}
.btn.primary {
  background: linear-gradient(135deg, var(--gold) 0%, rgba(201,169,110,0.75) 100%);
  color: #07080c;
  box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, var(--glow-gold);
}
.btn.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,169,110,0.25); }
.btn.primary:active { transform: translateY(0); }
.btn.disabled { background: var(--bg3); color: var(--text4); cursor: not-allowed; border: 1px solid var(--border); }

/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.4rem 1.6rem;
  margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: var(--border2); }
.card-label {
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  color: var(--text4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
}

/* ── Perf grid ── */
.perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.perf-col-title { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 10px; }
.perf-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: var(--r-sm); margin-bottom: 4px;
}
.perf-rank { font-family: var(--mono); font-size: 11px; font-weight: 500; min-width: 18px; }
.perf-name { font-size: 13px; font-weight: 500; color: var(--text); }
.perf-score { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: var(--mono); }

/* ── File list ── */
.file-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.file-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 8px 14px; font-size: 13px;
  transition: border-color 0.15s;
}
.file-row:hover { border-color: var(--border2); }
.file-rm {
  background: none; border: none; cursor: pointer;
  color: var(--text4); font-size: 16px; transition: color 0.15s;
}
.file-rm:hover { color: var(--red2); }

/* ── Upload grid ── */
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.upload-opt {
  border: 1px solid var(--border); border-radius: var(--r-md);
  padding: 1.25rem; text-align: center; cursor: pointer;
  background: var(--bg2); transition: all 0.2s;
}
.upload-opt:hover { border-color: rgba(201,169,110,0.3); background: rgba(201,169,110,0.03); transform: translateY(-1px); }
.upload-opt-icon { font-size: 22px; margin-bottom: 6px; }
.upload-opt-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; color: var(--text); }
.upload-opt-sub { font-size: 11px; color: var(--text3); }

/* ── Gmail ── */
.gmail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.4rem 1.6rem; margin-bottom: 12px; }
.gmail-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 11px; border-radius: var(--r-md);
  border: 1px solid var(--border2); background: var(--bg3);
  font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 8px;
  color: var(--text); font-family: var(--font); transition: all 0.2s;
}
.gmail-btn:hover { border-color: var(--border3); background: var(--bg4); }
.gmail-connected {
  font-size: 12px; color: var(--teal2);
  background: var(--teal3); border: 1px solid rgba(79,209,197,0.15);
  padding: 8px 14px; border-radius: var(--r-sm); margin-bottom: 10px;
}
.gmail-filter { display: flex; gap: 8px; margin-bottom: 8px; }
.gmail-filter input, .gmail-filter select {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text); font-size: 12px;
  padding: 8px 12px; font-family: var(--font);
}
.gmail-filter input { flex: 1; }
.gmail-filter input:focus, .gmail-filter select:focus { outline: none; border-color: var(--gold); }
.gmail-status { font-size: 12px; color: var(--text3); margin-top: 6px; }

/* ── Stats ── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin: 1.5rem 0; }
.stat {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 16px; text-align: center;
  transition: all 0.2s;
}
.stat:hover { border-color: var(--border2); transform: translateY(-1px); }
.stat-n { font-family: var(--mono); font-size: 28px; font-weight: 500; margin-bottom: 4px; letter-spacing: -0.02em; }
.stat-l { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.02em; }

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 1.5rem;
  flex-wrap: wrap; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); padding-bottom: 1rem;
}
.tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab {
  padding: 6px 14px; border-radius: var(--r-sm);
  border: 1px solid transparent; background: transparent;
  font-size: 13px; cursor: pointer; color: var(--text3);
  font-family: var(--font); font-weight: 500;
  transition: all 0.15s; letter-spacing: -0.01em;
}
.tab:hover { color: var(--text2); background: var(--bg3); }
.tab.active { color: var(--text); background: var(--bg3); border-color: var(--border2); }
.pdf-btn {
  padding: 8px 16px; border-radius: var(--r-sm);
  border: 1px solid var(--border2); background: transparent;
  font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
  color: var(--text2); font-family: var(--font);
  transition: all 0.15s; letter-spacing: -0.01em;
}
.pdf-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border3); }

/* ── Items ── */
.item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 16px 20px; margin-bottom: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.item:hover { border-color: var(--border2); }
.item-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); letter-spacing: -0.01em; }
.item-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 8px; }

/* ── Badges ── */
.badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; display: inline-block; font-family: var(--mono); letter-spacing: 0.04em; }
.bg { background: rgba(79,209,197,0.1); color: var(--teal2); border: 1px solid rgba(79,209,197,0.2); }
.br { background: rgba(252,92,92,0.1); color: var(--red2); border: 1px solid rgba(252,92,92,0.18); }
.bo { background: var(--orange2); color: var(--orange); border: 1px solid rgba(232,149,90,0.25); }
.bb { background: rgba(91,155,213,0.1); color: #93c5fd; border: 1px solid rgba(91,155,213,0.2); }
.risk { font-size: 12px; color: var(--red2); margin-top: 6px; }

/* ── Error ── */
.err {
  background: rgba(252,92,92,0.07); border: 1px solid rgba(252,92,92,0.18);
  border-radius: var(--r-md); padding: 12px 18px; color: var(--red2);
  font-size: 13px; margin-bottom: 1rem; line-height: 1.6;
}

/* ── Summary card ── */
.summary-card {
  background: linear-gradient(135deg, rgba(201,169,110,0.05), rgba(79,209,197,0.03));
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: var(--r-lg); padding: 1.6rem; margin-bottom: 12px;
}
.summary-text { font-size: 14px; line-height: 1.8; color: var(--text2); }

/* ── Reset btn ── */
.reset-btn {
  background: none; border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 4px 12px; font-size: 11px;
  cursor: pointer; color: var(--text3); font-family: var(--font);
  transition: all 0.15s;
}
.reset-btn:hover { border-color: var(--border2); color: var(--text2); }
.sum-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

/* ── Module 2 specific ── */
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
.category-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 1rem 1.25rem; transition: all 0.2s; }
.category-card:hover { border-color: var(--border2); }
.category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.category-name { font-size: 14px; font-weight: 600; color: var(--text); }
.category-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.category-files { display: flex; flex-direction: column; gap: 4px; }
.category-file { font-size: 12px; color: var(--text2); padding: 4px 8px; background: var(--bg3); border-radius: 6px; display: flex; align-items: center; gap: 6px; }
.uncategorized-list { display: flex; flex-direction: column; gap: 8px; }
.uncat-item { background: var(--bg2); border: 1px solid rgba(252,92,92,0.12); border-radius: var(--r-md); padding: 14px 18px; }
.uncat-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
.uncat-suggest { font-size: 12px; color: var(--text3); margin-bottom: 8px; line-height: 1.6; }
.uncat-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.assign-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; font-size: 11px; cursor: pointer; color: var(--text2); font-family: var(--font); transition: all 0.15s; }
.assign-btn:hover { background: var(--bg3); color: var(--text); }
.assign-btn.suggested { border-color: var(--orange); color: var(--orange); }
.search-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-input { flex: 1; padding: 11px 14px; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 13px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--gold); }
.search-btn { padding: 11px 22px; border-radius: var(--r-md); border: none; background: linear-gradient(135deg, var(--gold), rgba(201,169,110,0.75)); color: #07080c; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
.search-btn:hover { transform: translateY(-1px); box-shadow: var(--glow-gold); }
.similar-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px 20px; margin-bottom: 10px; transition: border-color 0.2s; }
.similar-card:hover { border-color: rgba(201,169,110,0.3); }
.similar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.similar-name { font-size: 14px; font-weight: 600; color: var(--text); }
.similar-score { font-size: 12px; font-weight: 700; color: var(--gold); font-family: var(--mono); }
.similar-category { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: var(--mono); }
.similar-reason { font-size: 12px; color: var(--text2); line-height: 1.6; }

/* ── PDF area ── */
#pdf-area { position: fixed; left: -9999px; top: 0; width: 794px; background: white; font-family: sans-serif; padding: 48px; color: #1a1a1a; }
.pa-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.pa-date { font-size: 12px; color: #888; margin-bottom: 28px; }
.pa-sec { margin-bottom: 24px; }
.pa-sec-title { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.06em; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; margin-bottom: 10px; }
.pa-item { margin-bottom: 10px; padding: 10px 14px; border-radius: 8px; border: 1px solid #e0e0e0; background: #f9f9f9; }
.pa-item.best { border-left: 3px solid #10b981; }
.pa-item.ng { border-left: 3px solid #ef4444; }
.pa-item-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.pa-item-desc { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 3px; }
.pa-item-ev { font-size: 11px; }
.pa-perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pa-perf-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
.pa-insights { font-size: 13px; line-height: 1.8; background: #f5f5f5; border-radius: 8px; padding: 14px; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card, .item, .stat, .similar-card, .uncat-item {
  animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1) both;
}
.card:nth-child(2), .item:nth-child(2), .stat:nth-child(2) { animation-delay: 0.04s; }
.card:nth-child(3), .item:nth-child(3), .stat:nth-child(3) { animation-delay: 0.08s; }
.card:nth-child(4), .item:nth-child(4), .stat:nth-child(4) { animation-delay: 0.12s; }
</style>
</head>
<body>
<div class="header-wrap">
  <div class="header-inner">
    <div class="logo">

function readFile(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.readAsText(file, "UTF-8");
  });
}

function readExcel(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var wb = XLSX.read(e.target.result, { type: "array" });
        var sheet = wb.Sheets[wb.SheetNames[0]];
        var csv = XLSX.utils.sheet_to_csv(sheet);
        resolve(csv);
      } catch(err) {
        resolve("");
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function saveApiKey(key) {
  localStorage.setItem("ai_mentor_api_key", key);
  setState({ apiKey: key, showApiSetup: false, err: "" });
}

async function callAPI(system, userMsg) {
  var apiKey = S.apiKey || localStorage.getItem("ai_mentor_api_key");
  if (!apiKey) {
    setState({ showApiSetup: true });
    throw new Error("APIキーが設定されていません");
  }
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 8000,
      system: system,
      messages: [{ role: "user", content: userMsg }]
    })
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  if (!data.content || !Array.isArray(data.content)) throw new Error("Invalid response: " + JSON.stringify(data));
  var txt = data.content.map(function(b){ return b.text || ""; }).join("");
  // JSONブロックを抽出
  var jsonMatch = txt.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("JSONが見つかりません: " + txt.slice(0, 200));
  return JSON.parse(jsonMatch[0]);
}

async function addFiles(fileList) {
  var arr = Array.from(fileList).filter(function(f){ return /\.(txt|md|csv)$/i.test(f.name) && !f.name.startsWith("."); });
  var results = [];
  for (var i = 0; i < arr.length; i++) {
    var f = arr[i];
    var content = await readFile(f);
    results.push({ name: f.name, size: f.size, path: f.webkitRelativePath || f.name, content: content });
  }
  var existing = S.docs.map(function(f){ return f.path || f.name; });
  var unique = results.filter(function(f){ return !existing.includes(f.path || f.name); });
  setState({ docs: S.docs.concat(unique), res: null, err: "" });
}

async function fetchGmails() {
  if (!S.gmailToken || S.gmailFetching) return;
  var qEl = document.getElementById("gq");
  var nEl = document.getElementById("gn");
  var q = qEl ? qEl.value : "";
  var n = nEl ? parseInt(nEl.value) : 20;
  setState({ gmailFetching: true, gmailStatus: "メールを取得中..." });
  try {
    var url = "https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=" + n + (q ? "&q=" + encodeURIComponent(q) : "");
    var listRes = await fetch(url, { headers: { Authorization: "Bearer " + S.gmailToken } });
    var listData = await listRes.json();
    var messages = listData.messages || [];
    if (!messages.length) { setState({ gmailFetching: false, gmailStatus: "メールが見つかりませんでした" }); return; }
    setState({ gmailStatus: messages.length + "件を処理中..." });
    var emailDocs = [];
    for (var i = 0; i < Math.min(messages.length, n); i++) {
      try {
        var mRes = await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/" + messages[i].id + "?format=full", { headers: { Authorization: "Bearer " + S.gmailToken } });
        var mData = await mRes.json();
        var headers = mData.payload && mData.payload.headers ? mData.payload.headers : [];
        var subject = (headers.find(function(h){ return h.name === "Subject"; }) || {}).value || "(件名なし)";
        var from    = (headers.find(function(h){ return h.name === "From";    }) || {}).value || "";
        var date    = (headers.find(function(h){ return h.name === "Date";    }) || {}).value || "";
        var body    = extractBody(mData.payload);
        if (body.trim().length < 20) continue;
        var content = "件名: " + subject + "\n差出人: " + from + "\n日付: " + date + "\n\n" + body;
        emailDocs.push({ name: "mail_" + messages[i].id.slice(0,8) + ".txt", size: content.length, path: "Gmail/" + subject.slice(0,30), content: content });
      } catch(e) {}
    }
    var existing = S.docs.map(function(f){ return f.path || f.name; });
    var unique = emailDocs.filter(function(f){ return !existing.includes(f.path || f.name); });
    setState({ docs: S.docs.concat(unique), gmailFetching: false, gmailStatus: unique.length + "件のメールを取込完了", res: null });
  } catch(e) {
    setState({ gmailFetching: false, gmailStatus: "取得失敗。再ログインしてください。", gmailToken: null });
  }
}

function extractBody(payload) {
  if (!payload) return "";
  if (payload.body && payload.body.data) {
    try { return atob(payload.body.data.replace(/-/g,"+").replace(/_/g,"/")); } catch(e) { return ""; }
  }
  if (payload.parts) {
    for (var i = 0; i < payload.parts.length; i++) {
      if (payload.parts[i].mimeType === "text/plain" && payload.parts[i].body && payload.parts[i].body.data) {
        try { return atob(payload.parts[i].body.data.replace(/-/g,"+").replace(/_/g,"/")); } catch(e) {}
      }
    }
    for (var j = 0; j < payload.parts.length; j++) {
      var r = extractBody(payload.parts[j]);
      if (r) return r;
    }
  }
  return "";
}

    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">マニュアル（${(r.manual_sections||[]).length}セクション）</p>
      ${(r.manual_sections||[]).map(function(s,i){ return '<div class="pa-item"><p class="pa-item-title">'+(i+1)+'. '+s.title+'</p><p class="pa-item-desc">'+s.content+'</p></div>'; }).join("")}
    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">組織改善インサイト</p>
      <p class="pa-insights">${r.insights}</p>
    </div>
    <div style="margin-top:40px;padding-top:14px;border-top:1px solid #e0ded8;font-size:11px;color:#aaa;display:flex;justify-content:space-between">
      <span>過去データ活用型 新人教育AIメンター</span><span>${now}</span>
    </div>`;
  try {
    var canvas = await html2canvas(document.getElementById("pdf-area"), { scale: 2, backgroundColor: "#fff" });
    var img = canvas.toDataURL("image/png");
    var pdf = new window.jspdf.jsPDF({ orientation: "portrait", unit: "px", format: "a4" });
    var pw = pdf.internal.pageSize.getWidth();
    var ph = pdf.internal.pageSize.getHeight();
    var iw = canvas.width / 2;
    var ih = canvas.height / 2;
    var ratio = pw / iw;
    var sh = ih * ratio;

    setState({ err: "PDF生成に失敗しました: " + e.message });
  }

  setState({ pdfLoading: false });
}

const API_KEY_STORAGE = "ai_mentor_api_key";

const P_LEARN = `あなたはファイル管理の専門家です。提供されたファイル一覧とフォルダ構造を分析し、この会社の分類ルールを学習してください。JSONのみ返してください。形式:{"categories":[{"name":"カテゴリ名","description":"どんなファイルが含まれるか","keywords":["キーワード1","キーワード2"],"examples":["ファイル例1"]}],"rules":"この会社の分類ルールの要約（2-3文）"}`;

const P_CLASSIFY = `あなたはファイル管理の専門家です。【学習済み分類ルール】を参照し、【新しいファイル一覧】を分類してください。JSONのみ返してください。形式:{"classified":[{"filename":"ファイル名","category":"カテゴリ名","confidence":85,"reason":"分類理由","elements":["要素1（例：顧客名: ABC商事）","要素2（例：種別: 提案書）","要素3（例：金額: 150万円）","要素4（例：担当: 田中）"]}],"uncategorized":[{"filename":"ファイル名","reason":"分類できない理由","suggested_category":"新カテゴリ案","elements":["要素1","要素2"]}]}`;

const P_SEARCH = `あなたは社内ナレッジ検索の専門家です。【インデックス済みファイル一覧】から【検索クエリ】に最も関連するファイルを検索してください。JSONのみ返してください。形式:{"results":[{"filename":"ファイル名","category":"カテゴリ","similarity_score":92,"reason":"関連する理由","key_points":"このファイルから得られる情報"}],"search_summary":"検索結果のサマリー"}`;

var M2 = {
  apiKey: localStorage.getItem(API_KEY_STORAGE) || "",
  showApiSetup: !localStorage.getItem(API_KEY_STORAGE),
  tab: "classify",
  // Step 1: 既存ファイル学習
  existingFiles: [], learning: false, learnResult: null,
  // Step 2: 新規ファイル分類
  newFiles: [], classifying: false, classifyResult: null,
  // Step 3: 検索
  searchQuery: "", searching: false, searchResult: null,
  searchIndex: [],
  err: ""
};

function m2set(p) { Object.assign(M2, p); m2render(); }

function m2rf(f) {
  return new Promise(function(r) { var x = new FileReader(); x.onload = function(e) { r(e.target.result); }; x.readAsText(f, "UTF-8"); });
}

function m2saveKey(key) {
  localStorage.setItem(API_KEY_STORAGE, key);
  m2set({ apiKey: key, showApiSetup: false, err: "" });
}

async function m2api(system, userMsg) {
  var apiKey = M2.apiKey || localStorage.getItem(API_KEY_STORAGE);
  if (!apiKey) { m2set({ showApiSetup: true }); throw new Error("APIキーが設定されていません"); }
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4000, system: system, messages: [{ role: "user", content: userMsg }] })
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message);
  var txt = data.content.map(function(b){ return b.text || ""; }).join("");
  var m = txt.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("JSONが見つかりません");
  return JSON.parse(m[0]);
}

async function m2addFiles(fileList, target) {
  var arr = Array.from(fileList).filter(function(f){ return !f.name.startsWith("."); });
  var results = await Promise.all(arr.map(async function(f) {
    var content = "";
    try { content = await m2rf(f); } catch(e) {}
    return { name: f.name, size: f.size, path: f.webkitRelativePath || f.name, content: content.slice(0, 500) };
  }));
  var existing = M2[target].map(function(f){ return f.path || f.name; });
  var unique = results.filter(function(f){ return !existing.includes(f.path || f.name); });
  var patch = {}; patch[target] = M2[target].concat(unique);
  m2set(patch);
}

async function m2learn() {
  if (!M2.existingFiles.length || M2.learning) return;
  m2set({ learning: true, err: "", learnResult: null });
  try {
    var fileList = M2.existingFiles.map(function(f){ return "パス: " + f.path + "\nファイル名: " + f.name + (f.content ? "\n内容の一部: " + f.content : ""); }).join("\n\n---\n\n");
    var result = await m2api(P_LEARN, "以下のファイル一覧からこの会社の分類ルールを学習してください:\n\n" + fileList);
    m2set({ learnResult: result, learning: false, searchIndex: M2.existingFiles });
  } catch(e) {
    m2set({ err: "学習に失敗しました: " + e.message, learning: false });
  }
}

async function m2classify() {
  if (!M2.newFiles.length || M2.classifying || !M2.learnResult) return;
  m2set({ classifying: true, err: "", classifyResult: null });
  try {
    var rules = JSON.stringify(M2.learnResult);
    var newList = M2.newFiles.map(function(f){ return "ファイル名: " + f.name + (f.content ? "\n内容の一部: " + f.content : ""); }).join("\n\n---\n\n");
    var result = await m2api(P_CLASSIFY, "【学習済み分類ルール】\n" + rules + "\n\n【新しいファイル一覧】\n" + newList);
    m2set({ classifyResult: result, classifying: false });
  } catch(e) {
    m2set({ err: "分類に失敗しました: " + e.message, classifying: false });
  }
}

async function m2search() {
  var q = document.getElementById("m2searchQ");
  if (!q || !q.value.trim() || M2.searching || !M2.learnResult) return;
  m2set({ searching: true, err: "", searchResult: null, searchQuery: q.value.trim() });
  try {
    var index = M2.existingFiles.concat(M2.newFiles).map(function(f){ return "カテゴリ: " + (m2getCat(f.name) || "未分類") + "\nファイル名: " + f.name + (f.content ? "\n内容: " + f.content : ""); }).join("\n\n---\n\n");
    var result = await m2api(P_SEARCH, "【インデックス済みファイル一覧】\n" + index + "\n\n【検索クエリ】\n" + M2.searchQuery);
    m2set({ searching: false, searchResult: result });
  } catch(e) {
    m2set({ err: "検索に失敗しました: " + e.message, searching: false });
  }
}

function m2getCat(filename) {
  if (!M2.classifyResult) return null;
  var found = (M2.classifyResult.classified || []).find(function(c){ return c.filename === filename; });
  return found ? found.category : null;
}

function m2assign(filename, category) {
  if (!M2.classifyResult) return;
  var uc = M2.classifyResult.uncategorized.filter(function(f){ return f.filename !== filename; });
  var cl = M2.classifyResult.classified.concat([{ filename: filename, category: category, confidence: 100, reason: "手動で割り当て" }]);
  m2set({ classifyResult: Object.assign({}, M2.classifyResult, { classified: cl, uncategorized: uc }) });
}

        app.appendChild(fl2);
      }

      var b2 = document.createElement("button"); b2.className = "btn " + (M2.newFiles.length>0&&!M2.classifying?"primary":"disabled");
      b2.textContent = M2.classifying ? "AIが分類中..." : "AIが自動分類する（" + M2.newFiles.length + "件）";
      if (M2.newFiles.length>0&&!M2.classifying) b2.onclick = m2classify;
      app.appendChild(b2);

    } else {
      // 分類結果表示
      var cr = M2.classifyResult;
      var totalFiles = (cr.classified||[]).length + (cr.uncategorized||[]).length;
      var sg = document.createElement("div"); sg.className = "stats-grid";
      [
        ["分類済み", (cr.classified||[]).length, "var(--teal)"],
        ["未分類", (cr.uncategorized||[]).length, "var(--red)"],
        ["カテゴリ数", new Set((cr.classified||[]).map(function(c){ return c.category; })).size, "var(--orange)"],
        ["精度（平均）", Math.round((cr.classified||[]).reduce(function(s,c){ return s+c.confidence; },0) / Math.max((cr.classified||[]).length,1)) + "%", "var(--accent2)"]
      ].forEach(function(item) {
        var st = document.createElement("div"); st.className = "stat";
        var n = document.createElement("p"); n.className = "stat-n"; n.style.color = item[2]; n.textContent = String(item[1]);
        var l = document.createElement("p"); l.className = "stat-l"; l.textContent = item[0];
        st.appendChild(n); st.appendChild(l); sg.appendChild(st);
      });
      app.appendChild(sg);

      // タブ
      var tbr = document.createElement("div"); tbr.className = "tab-bar";
      [["classified","分類済み"], ["uncat","未分類"], ["search","類似検索"]].forEach(function(t) {
        var tb = document.createElement("button"); tb.className = "tab" + (M2.tab===t[0]?" active":""); tb.textContent = t[1];
        tb.onclick = function() { m2set({ tab: t[0] }); }; tbr.appendChild(tb);
      });
      app.appendChild(tbr);

      if (M2.tab === "classified") {
        var fileList_ = document.createElement("div"); fileList_.style.cssText = "display:flex;flex-direction:column;gap:10px";
        (cr.classified||[]).forEach(function(c) {
          var fc = document.createElement("div"); fc.className = "card"; fc.style.cssText = "background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;transition:border-color 0.2s";
          // ヘッダー
          var fh = document.createElement("div"); fh.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:10px";
          var fn_ = document.createElement("span"); fn_.style.cssText = "font-size:14px;font-weight:600;color:var(--text)"; fn_.textContent = "📄 " + c.filename;
          var fmeta = document.createElement("div"); fmeta.style.cssText = "display:flex;align-items:center;gap:8px;flex-shrink:0";
          var fconf = document.createElement("span"); fconf.style.cssText = "font-size:11px;font-weight:700;color:" + (c.confidence>=80?"var(--teal2)":"var(--gold)"); fconf.textContent = c.confidence + "%";
          var fcat = document.createElement("span"); fcat.className = "badge bo"; fcat.textContent = c.category;
          fmeta.appendChild(fconf); fmeta.appendChild(fcat); fh.appendChild(fn_); fh.appendChild(fmeta); fc.appendChild(fh);
          // 要素箇条書き
          if (c.elements && c.elements.length > 0) {
            var elList = document.createElement("div"); elList.style.cssText = "display:flex;flex-direction:column;gap:4px;margin-bottom:10px";
            c.elements.forEach(function(el) {
              var eli = document.createElement("div"); eli.style.cssText = "font-size:12px;color:var(--text2);padding:3px 10px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;gap:6px";
              var dot = document.createElement("span"); dot.style.cssText = "width:4px;height:4px;border-radius:50%;background:var(--orange);flex-shrink:0"; eli.appendChild(dot);
              eli.appendChild(document.createTextNode(el)); elList.appendChild(eli);
            });
            fc.appendChild(elList);
          }
          // 分類理由 + カテゴリ変更
          var fr = document.createElement("div"); fr.style.cssText = "display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px";
          var freason = document.createElement("span"); freason.style.cssText = "font-size:11px;color:var(--text3);flex:1"; freason.textContent = c.reason;
          var factions = document.createElement("div"); factions.style.cssText = "display:flex;gap:4px;flex-wrap:wrap;align-items:center";
          var flbl = document.createElement("span"); flbl.style.cssText = "font-size:10px;color:var(--text3)"; flbl.textContent = "変更:";
          factions.appendChild(flbl);
          (M2.learnResult.categories||[]).filter(function(cat){ return cat.name !== c.category; }).forEach(function(cat) {
            var ab = document.createElement("button"); ab.className = "assign-btn"; ab.textContent = cat.name;
            ab.onclick = (function(fname, catname) { return function() {
              var uc2 = M2.classifyResult.uncategorized || [];
              var cl2 = M2.classifyResult.classified.map(function(x) { return x.filename === fname ? Object.assign({}, x, { category: catname, confidence: 100, reason: "手動変更" }) : x; });
              m2set({ classifyResult: Object.assign({}, M2.classifyResult, { classified: cl2, uncategorized: uc2 }) });
            }; })(c.filename, cat.name);
            factions.appendChild(ab);
          });
          fr.appendChild(freason); fr.appendChild(factions); fc.appendChild(fr);
          fileList_.appendChild(fc);
        });
        app.appendChild(fileList_);
      }

      if (M2.tab === "uncat") {
        if ((cr.uncategorized||[]).length === 0) {
          var noUncat = document.createElement("p"); noUncat.style.cssText = "text-align:center;color:var(--text3);font-size:13px;padding:2rem"; noUncat.textContent = "✓ すべてのファイルが分類されました";
          app.appendChild(noUncat);
        } else {
          var ul = document.createElement("div"); ul.style.cssText = "display:flex;flex-direction:column;gap:10px";
          (cr.uncategorized||[]).forEach(function(f) {
            var ui = document.createElement("div"); ui.className = "uncat-item";
            var uh = document.createElement("div"); uh.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:8px";
            var un = document.createElement("p"); un.className = "uncat-name"; un.style.marginBottom = "0"; un.textContent = "📄 " + f.filename;
            var ubadge = document.createElement("span"); ubadge.className = "badge br"; ubadge.textContent = "未分類";
            uh.appendChild(un); uh.appendChild(ubadge); ui.appendChild(uh);
            // 要素箇条書き
            if (f.elements && f.elements.length > 0) {
              var elList2 = document.createElement("div"); elList2.style.cssText = "display:flex;flex-direction:column;gap:4px;margin-bottom:8px";
              f.elements.forEach(function(el) {
                var eli = document.createElement("div"); eli.style.cssText = "font-size:12px;color:var(--text2);padding:3px 10px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;gap:6px";
                var dot = document.createElement("span"); dot.style.cssText = "width:4px;height:4px;border-radius:50%;background:var(--red2);flex-shrink:0"; eli.appendChild(dot);
                eli.appendChild(document.createTextNode(el)); elList2.appendChild(eli);
              });
              ui.appendChild(elList2);
            }
            var ur = document.createElement("p"); ur.className = "uncat-suggest"; ur.textContent = f.reason; ui.appendChild(ur);
            var ua = document.createElement("div"); ua.className = "uncat-actions";
            var sugLabel = document.createElement("span"); sugLabel.style.cssText = "font-size:11px;color:var(--text3);margin-right:4px;align-self:center"; sugLabel.textContent = "振り分け:";
            ua.appendChild(sugLabel);
            // 既存カテゴリボタン
            (M2.learnResult.categories||[]).forEach(function(cat) {
              var ab = document.createElement("button"); ab.className = "assign-btn" + (cat.name === f.suggested_category ? " suggested" : "");
              ab.textContent = cat.name; ab.onclick = function() { m2assign(f.filename, cat.name); }; ua.appendChild(ab);
            });
            if (f.suggested_category) {
              var newCat = document.createElement("button"); newCat.className = "assign-btn suggested"; newCat.textContent = "+ " + f.suggested_category;
              newCat.onclick = function() { m2assign(f.filename, f.suggested_category); }; ua.appendChild(newCat);
            }
            ui.appendChild(ua); ul.appendChild(ui);
          });
          app.appendChild(ul);
        }
      }

      if (M2.tab === "search") {
        var sq = document.createElement("div"); sq.className = "search-bar";
        var si = document.createElement("input"); si.type = "text"; si.className = "search-input"; si.placeholder = "例：営業提案書、顧客クレーム対応、システム導入事例..."; si.id = "m2searchQ"; si.value = M2.searchQuery || "";
        si.onkeydown = function(e) { if (e.key === "Enter") m2search(); };
        var sb3 = document.createElement("button"); sb3.className = "search-btn"; sb3.textContent = M2.searching ? "検索中..." : "🔍 検索"; sb3.onclick = m2search;
        sq.appendChild(si); sq.appendChild(sb3); app.appendChild(sq);

        if (M2.searchResult) {
          var ss = document.createElement("p"); ss.style.cssText = "font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1rem;padding:12px 16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)"; ss.textContent = M2.searchResult.search_summary;
          app.appendChild(ss);
          (M2.searchResult.results||[]).forEach(function(r) {
            var sc = document.createElement("div"); sc.className = "similar-card";
            var sh = document.createElement("div"); sh.className = "similar-header";
            var sn = document.createElement("span"); sn.className = "similar-name"; sn.textContent = "📄 " + r.filename;
            var ss2 = document.createElement("span"); ss2.className = "similar-score"; ss2.textContent = r.similarity_score + "% 一致";
            sh.appendChild(sn); sh.appendChild(ss2); sc.appendChild(sh);
            var scat = document.createElement("p"); scat.className = "similar-category"; scat.textContent = "カテゴリ: " + r.category;
            var sreason = document.createElement("p"); sreason.className = "similar-reason"; sreason.textContent = r.reason;
            if (r.key_points) {
              var skp = document.createElement("p"); skp.style.cssText = "font-size:12px;color:var(--orange);margin-top:6px"; skp.textContent = "💡 " + r.key_points; sc.appendChild(skp);
            }
            sc.appendChild(scat); sc.appendChild(sreason); app.appendChild(sc);
          });
        }
      }

      // やり直しボタン
      var resetBtn = document.createElement("button"); resetBtn.style.cssText = "background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--text3);font-family:inherit;margin-top:1rem"; resetBtn.textContent = "← 分類をやり直す"; resetBtn.onclick = function() { m2set({ classifyResult:null, newFiles:[] }); };
      app.appendChild(resetBtn);
    }
  }
}

m2render();

// ── INIT ──────────────────────────────────────────
render();
</script>
</body>
</html>
