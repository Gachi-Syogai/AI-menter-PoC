<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
.wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 2rem; }
.step-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
.sc { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.sc.done { background: #1D9E75; color: #fff; }
.sc.active { background: #1a1a1a; color: #fff; }
.sc.idle { background: #e8e6e0; color: #888; }
.sl { font-size: 13px; }
.sl.active { font-weight: 500; }
.step-line { flex: 1; height: 1px; background: #d0cec8; }
.sec-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.sec-sub { font-size: 12px; color: #666; margin-bottom: 12px; }
.dz { border: 1px dashed #bbb; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; background: white; margin-bottom: 10px; transition: border-color 0.15s, background 0.15s; }
.dz:hover { border-color: #888; background: #fafaf8; }
.dz.active { border: 1px solid #1D9E75; background: #f0fdf8; }
.dz-icon { font-size: 24px; margin-bottom: 6px; }
.dz-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.dz-sub { font-size: 11px; color: #888; }
.btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 1.5rem; }
.btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn.primary:hover { background: #333; }
.btn.disabled { background: #e8e6e0; color: #aaa; cursor: not-allowed; }
.card { background: white; border: 1px solid #e0ded8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
.card-label { font-size: 11px; color: #888; font-weight: 500; letter-spacing: 0.04em; margin-bottom: 8px; }
.perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.perf-col-title { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; margin-bottom: 8px; }
.perf-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 8px; margin-bottom: 3px; }
.perf-rank { font-size: 11px; font-weight: 500; min-width: 14px; }
.perf-name { font-size: 12px; font-weight: 500; }
.perf-score { font-size: 11px; color: #666; }
.file-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.file-row { display: flex; align-items: center; justify-content: space-between; background: #f5f4f0; border: 1px solid #e0ded8; border-radius: 8px; padding: 6px 12px; font-size: 13px; }
.file-rm { background: none; border: none; cursor: pointer; color: #888; font-size: 16px; }
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.upload-opt { border: 1px dashed #bbb; border-radius: 10px; padding: 1rem; text-align: center; cursor: pointer; background: white; transition: all 0.15s; }
.upload-opt:hover { border-color: #888; background: #fafaf8; }
.upload-opt-icon { font-size: 20px; margin-bottom: 4px; }
.upload-opt-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.upload-opt-sub { font-size: 11px; color: #888; }
.gmail-card { background: white; border: 1px solid #e0ded8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
.gmail-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e0ded8; background: white; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
.gmail-btn:hover { background: #fafaf8; }
.gmail-connected { font-size: 12px; color: #0F6E56; background: #E1F5EE; padding: 7px 12px; border-radius: 8px; margin-bottom: 8px; }
.gmail-filter { display: flex; gap: 8px; margin-bottom: 8px; }
.gmail-filter input { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1px solid #e0ded8; font-size: 12px; }
.gmail-filter select { padding: 7px 10px; border-radius: 8px; border: 1px solid #e0ded8; font-size: 12px; }
.gmail-status { font-size: 12px; color: #666; margin-top: 6px; }
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 1rem 0; }
.stat { background: #f5f4f0; border-radius: 8px; padding: 12px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 500; margin-bottom: 2px; }
.stat-l { font-size: 11px; color: #666; }
.tab-bar { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab { padding: 5px 12px; border-radius: 8px; border: 1px solid #e0ded8; background: transparent; font-size: 13px; cursor: pointer; color: #666; }
.tab.active { border-color: #888; background: white; font-weight: 500; color: #1a1a1a; }
.pdf-btn { padding: 9px 16px; border-radius: 8px; border: 1px solid #ccc; background: white; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.pdf-btn:hover { background: #f5f4f0; }
.item { background: white; border: 1px solid #e0ded8; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
.item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.item-desc { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 6px; }
.badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-block; }
.bg { background: #E1F5EE; color: #0F6E56; }
.br { background: #FCEBEB; color: #A32D2D; }
.risk { font-size: 12px; color: #A32D2D; margin-top: 6px; }
.err { background: #FCEBEB; border: 1px solid #f0b0b0; border-radius: 8px; padding: 12px 16px; color: #A32D2D; font-size: 13px; margin-bottom: 1rem; }
.reset-btn { background: none; border: 1px solid #e0ded8; border-radius: 6px; padding: 2px 10px; font-size: 11px; cursor: pointer; color: #666; }
.summary-text { font-size: 14px; line-height: 1.7; }
.sum-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
#pdf-area { position: fixed; left: -9999px; top: 0; width: 794px; background: white; font-family: -apple-system, sans-serif; padding: 48px; color: #1a1a1a; }
.pa-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.pa-date { font-size: 12px; color: #888; margin-bottom: 28px; }
.pa-sec { margin-bottom: 24px; }
.pa-sec-title { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.06em; border-bottom: 1px solid #e0ded8; padding-bottom: 6px; margin-bottom: 10px; }
.pa-item { margin-bottom: 10px; padding: 10px 14px; border-radius: 8px; border: 1px solid #e0ded8; background: #fafaf8; }
.pa-item.best { border-left: 3px solid #1D9E75; }
.pa-item.ng { border-left: 3px solid #E24B4A; }
.pa-item-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.pa-item-desc { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 3px; }
.pa-item-ev { font-size: 11px; }
.pa-perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pa-perf-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
.pa-insights { font-size: 13px; line-height: 1.8; background: #f5f4f0; border-radius: 8px; padding: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>過去データ活用型 新人教育AIメンター</h1>
  <p class="subtitle">成績データとドキュメントを統合分析し、根拠あるマニュアルを自動生成します</p>
  <div id="app"></div>
</div>
<div id="pdf-area"></div>

<script>
// ── 定数 ──────────────────────────────────────────
const CLIENT_ID = "452964567694-ic9cc5beu3jt9m0pl1rue7fh61d04cha.apps.googleusercontent.com";
const SCOPES    = "https://www.googleapis.com/auth/gmail.readonly";

const P1 = `組織分析の専門家として、CSVの成績データから上位5名・下位5名を特定してください。JSONのみ返してください。形式:{"metric_name":"指標名","top5":[{"rank":1,"name":"氏名","score":"値"}],"bottom5":[{"rank":1,"name":"氏名","score":"値"}]}`;
const P2 = `組織分析の専門家として、成績データとドキュメントを統合分析し、JSONのみ返してください。各配列は最大3件。メールテンプレートはドキュメント内の成績上位者のメール文例を参照し文体・構成・言い回しを分析して新人が使える汎用テンプレートを生成。形式:{"summary":"概要","best_practices":[{"title":"タイトル","description":"説明","evidence":"根拠"}],"ng_practices":[{"title":"タイトル","description":"説明","risk":"リスク"}],"manual_sections":[{"title":"タイトル","content":"内容"}],"email_templates":[{"title":"メールの種類","subject":"件名テンプレート","body":"本文テンプレート（穴埋め形式）","point":"上位者から学んだポイント"}],"insights":"インサイト"}`;

// ── 状態 ──────────────────────────────────────────
var S = {
  pf: null, pc: "", pr: null, pa: false,
  docs: [], da: false,
  res: null, err: "", tab: "best",
  pdfLoading: false,
  gmailToken: null, gmailUser: "", gmailLoading: false,
  gmailStatus: "", gmailFetching: false
};

// ── ユーティリティ ────────────────────────────────
function setState(patch) {
  Object.assign(S, patch);
  render();
}

function readFile(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.readAsText(file, "UTF-8");
  });
}

async function callAPI(system, userMsg) {
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      system: system,
      messages: [{ role: "user", content: userMsg }]
    })
  });
  var data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  if (!data.content || !Array.isArray(data.content)) throw new Error("Invalid response: " + JSON.stringify(data));
  var txt = data.content.map(function(b){ return b.text || ""; }).join("");
  // JSONブロックを抽出
  var jsonMatch = txt.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("JSONが見つかりません: " + txt.slice(0, 200));
  return JSON.parse(jsonMatch[0]);
}

// ── アクション ────────────────────────────────────
async function runStep1() {
  if (!S.pc || S.pa) return;
  setState({ pa: true, err: "" });
  try {
    var pr = await callAPI(P1, "以下の成績データを分析してください:\n\n" + S.pc.slice(0, 6000));
    setState({ pr: pr, pa: false });
  } catch(e) {
    setState({ err: "成績データの分析に失敗しました。CSVの形式を確認してください。エラー: " + e.message, pa: false });
  }
}

async function runStep2() {
  if (!S.docs.length || S.da) return;
  setState({ da: true, err: "", res: null });
  try {
    var docs = S.docs.map(function(f){ return "=== " + f.name + " ===\n" + f.content.slice(0, Math.floor(5000 / S.docs.length)); }).join("\n\n");
    var perf = "上位5名: " + S.pr.top5.map(function(p){ return p.name; }).join(", ") + "\n下位5名: " + S.pr.bottom5.map(function(p){ return p.name; }).join(", ") + "\n指標: " + S.pr.metric_name;
    var res = await callAPI(P2, "【成績分析結果】\n" + perf + "\n\n【社内ドキュメント】\n" + docs);
    setState({ res: res, da: false, tab: "best" });
  } catch(e) {
    setState({ err: "ドキュメント分析に失敗しました。エラー: " + e.message, da: false });
  }
}

async function addFiles(fileList) {
  var arr = Array.from(fileList).filter(function(f){ return /\.(txt|md|csv)$/i.test(f.name) && !f.name.startsWith("."); });
  var results = [];
  for (var i = 0; i < arr.length; i++) {
    var f = arr[i];
    var content = await readFile(f);
    results.push({ name: f.name, size: f.size, path: f.webkitRelativePath || f.name, content: content });
  }
  var existing = S.docs.map(function(f){ return f.path || f.name; });
  var unique = results.filter(function(f){ return !existing.includes(f.path || f.name); });
  setState({ docs: S.docs.concat(unique), res: null, err: "" });
}

function connectGmail() {
  if (S.gmailLoading || S.gmailToken) return;
  setState({ gmailLoading: true, gmailStatus: "" });
  try {
    var client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async function(resp) {
        if (resp.error) { setState({ gmailLoading: false, gmailStatus: "認証エラー: " + resp.error }); return; }
        try {
          var r = await fetch("https://www.googleapis.com/gmail/v1/users/me/profile", { headers: { Authorization: "Bearer " + resp.access_token } });
          var d = await r.json();
          setState({ gmailToken: resp.access_token, gmailUser: d.emailAddress || "", gmailLoading: false, gmailStatus: "接続済み" });
        } catch(e) {
          setState({ gmailToken: resp.access_token, gmailLoading: false, gmailStatus: "接続済み" });
        }
      }
    });
    client.requestAccessToken();
  } catch(e) {
    setState({ gmailLoading: false, gmailStatus: "Google認証ライブラリの読み込みを待っています。少し待ってから再試行してください。" });
  }
}

async function fetchGmails() {
  if (!S.gmailToken || S.gmailFetching) return;
  var qEl = document.getElementById("gq");
  var nEl = document.getElementById("gn");
  var q = qEl ? qEl.value : "";
  var n = nEl ? parseInt(nEl.value) : 20;
  setState({ gmailFetching: true, gmailStatus: "メールを取得中..." });
  try {
    var url = "https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=" + n + (q ? "&q=" + encodeURIComponent(q) : "");
    var listRes = await fetch(url, { headers: { Authorization: "Bearer " + S.gmailToken } });
    var listData = await listRes.json();
    var messages = listData.messages || [];
    if (!messages.length) { setState({ gmailFetching: false, gmailStatus: "メールが見つかりませんでした" }); return; }
    setState({ gmailStatus: messages.length + "件を処理中..." });
    var emailDocs = [];
    for (var i = 0; i < Math.min(messages.length, n); i++) {
      try {
        var mRes = await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/" + messages[i].id + "?format=full", { headers: { Authorization: "Bearer " + S.gmailToken } });
        var mData = await mRes.json();
        var headers = mData.payload && mData.payload.headers ? mData.payload.headers : [];
        var subject = (headers.find(function(h){ return h.name === "Subject"; }) || {}).value || "(件名なし)";
        var from    = (headers.find(function(h){ return h.name === "From";    }) || {}).value || "";
        var date    = (headers.find(function(h){ return h.name === "Date";    }) || {}).value || "";
        var body    = extractBody(mData.payload);
        if (body.trim().length < 20) continue;
        var content = "件名: " + subject + "\n差出人: " + from + "\n日付: " + date + "\n\n" + body;
        emailDocs.push({ name: "mail_" + messages[i].id.slice(0,8) + ".txt", size: content.length, path: "Gmail/" + subject.slice(0,30), content: content });
      } catch(e) {}
    }
    var existing = S.docs.map(function(f){ return f.path || f.name; });
    var unique = emailDocs.filter(function(f){ return !existing.includes(f.path || f.name); });
    setState({ docs: S.docs.concat(unique), gmailFetching: false, gmailStatus: unique.length + "件のメールを取込完了", res: null });
  } catch(e) {
    setState({ gmailFetching: false, gmailStatus: "取得失敗。再ログインしてください。", gmailToken: null });
  }
}

function extractBody(payload) {
  if (!payload) return "";
  if (payload.body && payload.body.data) {
    try { return atob(payload.body.data.replace(/-/g,"+").replace(/_/g,"/")); } catch(e) { return ""; }
  }
  if (payload.parts) {
    for (var i = 0; i < payload.parts.length; i++) {
      if (payload.parts[i].mimeType === "text/plain" && payload.parts[i].body && payload.parts[i].body.data) {
        try { return atob(payload.parts[i].body.data.replace(/-/g,"+").replace(/_/g,"/")); } catch(e) {}
      }
    }
    for (var j = 0; j < payload.parts.length; j++) {
      var r = extractBody(payload.parts[j]);
      if (r) return r;
    }
  }
  return "";
}

async function exportPDF() {
  if (!S.res || S.pdfLoading) return;
  setState({ pdfLoading: true });
  var r = S.res;
  var pr = S.pr;
  var now = new Date().toLocaleDateString("ja-JP", { year:"numeric", month:"long", day:"numeric" });
  document.getElementById("pdf-area").innerHTML = `
    <p class="pa-title">新人教育マニュアル 分析レポート</p>
    <p class="pa-date">生成日: ${now} ｜ 指標: ${pr.metric_name} ｜ ドキュメント: ${S.docs.length}件</p>
    <div class="pa-sec">
      <p class="pa-sec-title">分析サマリー</p>
      <p style="font-size:14px;line-height:1.8">${r.summary}</p>
    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">成績データ（${pr.metric_name}）</p>
      <div class="pa-perf-grid">
        <div>
          <p style="font-size:11px;font-weight:600;color:#1D9E75;margin-bottom:8px">成績上位5名</p>
          ${pr.top5.map(function(p){ return '<div class="pa-perf-row" style="background:#E1F5EE"><span style="color:#1D9E75;font-weight:600;min-width:16px">'+p.rank+'</span><div><div style="font-weight:500">'+p.name+'</div><div style="font-size:11px;color:#666">'+p.score+'</div></div></div>'; }).join("")}
        </div>
        <div>
          <p style="font-size:11px;font-weight:600;color:#E24B4A;margin-bottom:8px">成績下位5名</p>
          ${pr.bottom5.map(function(p){ return '<div class="pa-perf-row" style="background:#FCEBEB"><span style="color:#E24B4A;font-weight:600;min-width:16px">'+p.rank+'</span><div><div style="font-weight:500">'+p.name+'</div><div style="font-size:11px;color:#666">'+p.score+'</div></div></div>'; }).join("")}
        </div>
      </div>
    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">模範行動（${(r.best_practices||[]).length}件）</p>
      ${(r.best_practices||[]).map(function(b){ return '<div class="pa-item best"><p class="pa-item-title">'+b.title+'</p><p class="pa-item-desc">'+b.description+'</p>'+(b.evidence?'<p class="pa-item-ev" style="color:#0F6E56">根拠: '+b.evidence+'</p>':'')+'</div>'; }).join("")}
    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">NG行動（${(r.ng_practices||[]).length}件）</p>
      ${(r.ng_practices||[]).map(function(n){ return '<div class="pa-item ng"><p class="pa-item-title">'+n.title+'</p><p class="pa-item-desc">'+n.description+'</p>'+(n.evidence?'<p class="pa-item-ev" style="color:#A32D2D">根拠: '+n.evidence+'</p>':'')+(n.risk?'<p class="pa-item-ev" style="color:#A32D2D">リスク: '+n.risk+'</p>':'')+'</div>'; }).join("")}
    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">マニュアル（${(r.manual_sections||[]).length}セクション）</p>
      ${(r.manual_sections||[]).map(function(s,i){ return '<div class="pa-item"><p class="pa-item-title">'+(i+1)+'. '+s.title+'</p><p class="pa-item-desc">'+s.content+'</p></div>'; }).join("")}
    </div>
    <div class="pa-sec">
      <p class="pa-sec-title">組織改善インサイト</p>
      <p class="pa-insights">${r.insights}</p>
    </div>
    <div style="margin-top:40px;padding-top:14px;border-top:1px solid #e0ded8;font-size:11px;color:#aaa;display:flex;justify-content:space-between">
      <span>過去データ活用型 新人教育AIメンター</span><span>${now}</span>
    </div>`;
  try {
    var canvas = await html2canvas(document.getElementById("pdf-area"), { scale: 2, backgroundColor: "#fff" });
    var img = canvas.toDataURL("image/png");
    var pdf = new window.jspdf.jsPDF({ orientation: "portrait", unit: "px", format: "a4" });
    var pw = pdf.internal.pageSize.getWidth();
    var ph = pdf.internal.pageSize.getHeight();
    var iw = canvas.width / 2;
    var ih = canvas.height / 2;
    var ratio = pw / iw;
    var sh = ih * ratio;
    var y = 0;
    while (y < sh) {
      if (y > 0) pdf.addPage();
      pdf.addImage(img, "PNG", 0, -(y / ratio) * 2 * ratio / 2, pw, sh, undefined, "FAST");
      y += ph;
    }
    pdf.save("AIメンター分析レポート_" + now + ".pdf");
  } catch(e) {
    setState({ err: "PDF生成に失敗しました: " + e.message });
  }
  document.getElementById("pdf-area").innerHTML = "";
  setState({ pdfLoading: false });
}

// ── 描画 ──────────────────────────────────────────
function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";

  // ステップバー
  var s1done = !!S.pr, s2done = !!S.res;
  var sb = document.createElement("div"); sb.className = "step-bar";
  function mkC(n, done, active) {
    var c = document.createElement("div");
    c.className = "sc " + (done ? "done" : active ? "active" : "idle");
    c.textContent = done ? "✓" : String(n);
    return c;
  }
  function mkL(t, active) {
    var l = document.createElement("span");
    l.className = "sl" + (active ? " active" : "");
    l.textContent = t;
    return l;
  }
  sb.appendChild(mkC(1, s1done, !s1done));
  sb.appendChild(mkL("成績データ", !s1done));
  var line = document.createElement("div"); line.className = "step-line";
  sb.appendChild(line);
  sb.appendChild(mkC(2, s2done, s1done && !s2done));
  sb.appendChild(mkL("ドキュメント", s1done && !s2done));
  app.appendChild(sb);

  // エラー
  if (S.err) {
    var eb = document.createElement("div"); eb.className = "err"; eb.textContent = S.err;
    app.appendChild(eb);
  }

  // ─── STEP 1 ───────────────────────────────────
  var t1 = document.createElement("p"); t1.className = "sec-title"; t1.textContent = "Step 1 — 成績データのアップロード"; app.appendChild(t1);
  var s1 = document.createElement("p"); s1.className = "sec-sub"; s1.textContent = "氏名・成績スコアが入ったCSVをアップロード。AIがトップ5・ワースト5を自動抽出します。"; app.appendChild(s1);

  if (!S.pr) {
    // ファイル入力
    var perfInput = document.createElement("input");
    perfInput.type = "file";
    perfInput.accept = ".csv,.txt";
    perfInput.style.display = "none";
    perfInput.id = "perfInput";
    document.body.appendChild(perfInput);

    perfInput.onchange = async function(e) {
      var f = e.target.files[0];
      if (!f) return;
      var c = await readFile(f);
      setState({ pf: f, pc: c, err: "" });
    };

    var dz = document.createElement("div");
    dz.className = "dz" + (S.pf ? " active" : "");
    dz.innerHTML = '<div class="dz-icon">📊</div>' +
      '<div class="dz-title">' + (S.pf ? S.pf.name : "成績CSVをアップロード") + '</div>' +
      '<div class="dz-sub">' + (S.pf ? (S.pf.size/1024).toFixed(1)+" KB" : ".csv 推奨（氏名・スコア含む）") + '</div>';
    dz.onclick = function() { perfInput.click(); };
    app.appendChild(dz);

    var b1 = document.createElement("button");
    b1.className = "btn " + (S.pf && !S.pa ? "primary" : "disabled");
    b1.textContent = S.pa ? "分析中..." : "トップ5・ワースト5を抽出する";
    if (S.pf && !S.pa) b1.onclick = runStep1;
    app.appendChild(b1);

  } else {
    // 成績結果カード
    var pr = S.pr;
    var c1 = document.createElement("div"); c1.className = "card";
    var topRow = document.createElement("div"); topRow.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:10px";
    var ml = document.createElement("p"); ml.className = "card-label"; ml.style.marginBottom = "0"; ml.textContent = "指標: " + pr.metric_name;
    var rb = document.createElement("button"); rb.className = "reset-btn"; rb.textContent = "やり直す";
    rb.onclick = function() { setState({ pf:null, pc:"", pr:null, docs:[], res:null, err:"" }); };
    topRow.appendChild(ml); topRow.appendChild(rb); c1.appendChild(topRow);
    var pg = document.createElement("div"); pg.className = "perf-grid";
    [["成績上位5名", pr.top5, "#1D9E75", "#E1F5EE"], ["成績下位5名", pr.bottom5, "#E24B4A", "#FCEBEB"]].forEach(function(item) {
      var lbl = item[0], data = item[1], col = item[2], bg = item[3];
      var col_ = document.createElement("div");
      var ct = document.createElement("p"); ct.className = "perf-col-title"; ct.style.color = col; ct.textContent = lbl; col_.appendChild(ct);
      data.forEach(function(p) {
        var row = document.createElement("div"); row.className = "perf-row"; row.style.background = bg;
        var rk = document.createElement("span"); rk.className = "perf-rank"; rk.style.color = col; rk.textContent = String(p.rank);
        var info = document.createElement("div");
        var nm = document.createElement("p"); nm.className = "perf-name"; nm.textContent = p.name;
        var sc = document.createElement("p"); sc.className = "perf-score"; sc.textContent = p.score;
        info.appendChild(nm); info.appendChild(sc);
        row.appendChild(rk); row.appendChild(info); col_.appendChild(row);
      });
      pg.appendChild(col_);
    });
    c1.appendChild(pg); app.appendChild(c1);

    // ─── STEP 2 ─────────────────────────────────
    var t2 = document.createElement("p"); t2.className = "sec-title"; t2.textContent = "Step 2 — 社内ドキュメントのアップロード"; app.appendChild(t2);
    var s2s = document.createElement("p"); s2s.className = "sec-sub"; s2s.textContent = "ファイル・フォルダのアップロード、またはGmailから直接メールを取込できます。"; app.appendChild(s2s);

    // Gmail連携カード
    var gc = document.createElement("div"); gc.className = "gmail-card";
    var gl = document.createElement("p"); gl.className = "card-label"; gl.textContent = "Gmail連携（メール自動取込）"; gc.appendChild(gl);

    if (!S.gmailToken) {
      var gBtn = document.createElement("button"); gBtn.className = "gmail-btn";
      gBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L12 9.91l8.073-6.073C21.69 2.28 24 3.434 24 5.457z"/></svg>';
      gBtn.innerHTML += S.gmailLoading ? " 接続中..." : " Gmailでログインしてメールを取込む";
      if (!S.gmailLoading) gBtn.onclick = connectGmail;
      gc.appendChild(gBtn);
    } else {
      var gcon = document.createElement("p"); gcon.className = "gmail-connected"; gcon.textContent = "✓ " + (S.gmailUser || "Gmail") + " に接続済み"; gc.appendChild(gcon);
      var gf = document.createElement("div"); gf.className = "gmail-filter";
      var qi = document.createElement("input"); qi.type = "text"; qi.placeholder = "検索条件（例: from:田中 ／空欄で全件）"; qi.id = "gq";
      var ns = document.createElement("select"); ns.id = "gn";
      [10,20,50,100].forEach(function(n) { var o = document.createElement("option"); o.value = String(n); o.textContent = "最新"+n+"件"; ns.appendChild(o); });
      ns.value = "20";
      gf.appendChild(qi); gf.appendChild(ns); gc.appendChild(gf);
      var fetchBtn = document.createElement("button"); fetchBtn.className = "gmail-btn";
      fetchBtn.textContent = S.gmailFetching ? "取込中..." : "メールを取込む →";
      if (!S.gmailFetching) fetchBtn.onclick = fetchGmails;
      gc.appendChild(fetchBtn);
      var disc = document.createElement("button"); disc.style.cssText = "background:none;border:none;cursor:pointer;font-size:11px;color:#888;margin-top:4px";
      disc.textContent = "連携を解除する"; disc.onclick = function() { setState({ gmailToken:null, gmailUser:"", gmailStatus:"" }); };
      gc.appendChild(disc);
    }
    if (S.gmailStatus) {
      var gs = document.createElement("p"); gs.className = "gmail-status"; gs.textContent = S.gmailStatus; gc.appendChild(gs);
    }
    app.appendChild(gc);

    // ファイル・フォルダアップロード
    var fileInput = document.createElement("input"); fileInput.type = "file"; fileInput.accept = ".txt,.md,.csv"; fileInput.multiple = true; fileInput.style.display = "none"; fileInput.id = "fileInput";
    document.body.appendChild(fileInput);
    fileInput.onchange = async function(e) { await addFiles(e.target.files); e.target.value = ""; };

    var folderInput = document.createElement("input"); folderInput.type = "file"; folderInput.style.display = "none"; folderInput.id = "folderInput";
    folderInput.setAttribute("webkitdirectory", ""); folderInput.multiple = true;
    document.body.appendChild(folderInput);
    folderInput.onchange = async function(e) { await addFiles(e.target.files); e.target.value = ""; };

    var ug = document.createElement("div"); ug.className = "upload-grid";
    function mkOpt(icon, title, sub, onClick) {
      var o = document.createElement("div"); o.className = "upload-opt";
      o.innerHTML = '<div class="upload-opt-icon">'+icon+'</div><div class="upload-opt-title">'+title+'</div><div class="upload-opt-sub">'+sub+'</div>';
      o.onclick = onClick; return o;
    }
    ug.appendChild(mkOpt("📄", "ファイルを選択", ".txt / .md / .csv（複数可）", function() { fileInput.click(); }));
    ug.appendChild(mkOpt("📁", "フォルダを丸ごと選択", "フォルダ内の対応ファイルを一括取込", function() { folderInput.click(); }));
    app.appendChild(ug);

    // ドロップゾーン
    var dz2 = document.createElement("div"); dz2.className = "dz"; dz2.style.marginBottom = "10px";
    dz2.innerHTML = '<div class="dz-icon">↓</div><div class="dz-title">ここにファイル・フォルダをドロップ</div><div class="dz-sub">.txt / .md / .csv に対応</div>';
    dz2.ondragover = function(e) { e.preventDefault(); dz2.style.borderColor = "#888"; dz2.style.background = "#fafaf8"; };
    dz2.ondragleave = function() { dz2.style.borderColor = ""; dz2.style.background = ""; };
    dz2.ondrop = async function(e) { e.preventDefault(); dz2.style.borderColor = ""; dz2.style.background = ""; await addFiles(e.dataTransfer.files); };
    app.appendChild(dz2);

    // ファイルリスト
    if (S.docs.length > 0) {
      var sumBar = document.createElement("div"); sumBar.className = "sum-bar";
      var cb = document.createElement("span"); cb.className = "badge bg"; cb.textContent = S.docs.length + "件"; sumBar.appendChild(cb);
      var st = document.createElement("span"); st.style.cssText = "font-size:12px;color:#888"; st.textContent = "合計 " + (S.docs.reduce(function(s,f){ return s+f.size; },0)/1024).toFixed(1) + " KB"; sumBar.appendChild(st);
      var clr = document.createElement("button"); clr.style.cssText = "margin-left:auto;background:none;border:none;cursor:pointer;font-size:12px;color:#888"; clr.textContent = "すべて削除";
      clr.onclick = function() { setState({ docs:[], res:null }); }; sumBar.appendChild(clr);
      app.appendChild(sumBar);
      var fl = document.createElement("div"); fl.className = "file-list";
      S.docs.slice(0, 8).forEach(function(f) {
        var row = document.createElement("div"); row.className = "file-row";
        var left = document.createElement("div"); left.style.cssText = "overflow:hidden;flex:1";
        var sp = document.createElement("span"); sp.textContent = "📄 " + f.name; sp.style.cssText = "white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block"; left.appendChild(sp);
        if (f.path && f.path !== f.name) { var pt = document.createElement("span"); pt.style.cssText = "font-size:11px;color:#888;display:block"; pt.textContent = f.path; left.appendChild(pt); }
        var rm = document.createElement("button"); rm.className = "file-rm"; rm.textContent = "×";
        (function(fname){ rm.onclick = function() { setState({ docs: S.docs.filter(function(d){ return (d.path||d.name) !== fname; }), res: null }); }; })(f.path||f.name);
        row.appendChild(left); row.appendChild(rm); fl.appendChild(row);
      });
      if (S.docs.length > 8) { var more = document.createElement("p"); more.style.cssText = "font-size:12px;color:#888;padding:4px 12px"; more.textContent = "...他 " + (S.docs.length-8) + " 件"; fl.appendChild(more); }
      app.appendChild(fl);
    }

    var canRun = S.docs.length > 0 && !S.da;
    var b2 = document.createElement("button"); b2.className = "btn " + (canRun ? "primary" : "disabled");
    b2.textContent = S.da ? "成績データと紐付けて分析中..." : "成績データと紐付けて分析する" + (S.docs.length > 0 ? " (" + S.docs.length + "件)" : "");
    if (canRun) b2.onclick = runStep2;
    app.appendChild(b2);
  }

  // ─── 分析結果 ────────────────────────────────────
  if (S.res) {
    var r = S.res;
    var sc = document.createElement("div"); sc.className = "card";
    var smeta = document.createElement("div"); smeta.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:8px";
    var slbl = document.createElement("p"); slbl.className = "card-label"; slbl.style.marginBottom = "0"; slbl.textContent = "統合分析サマリー";
    var sbadge = document.createElement("span"); sbadge.className = "badge bg"; sbadge.textContent = "成績データ連動";
    smeta.appendChild(slbl); smeta.appendChild(sbadge); sc.appendChild(smeta);
    var stxt = document.createElement("p"); stxt.className = "summary-text"; stxt.textContent = r.summary; sc.appendChild(stxt);
    app.appendChild(sc);

    var sg = document.createElement("div"); sg.className = "stats-grid";
    [["模範行動",(r.best_practices||[]).length,"#1D9E75"],["NG行動",(r.ng_practices||[]).length,"#E24B4A"],["マニュアル",(r.manual_sections||[]).length,"#185FA5"]].forEach(function(item) {
      var cd = document.createElement("div"); cd.className = "stat";
      var n = document.createElement("p"); n.className = "stat-n"; n.style.color = item[2]; n.textContent = String(item[1]);
      var l = document.createElement("p"); l.className = "stat-l"; l.textContent = item[0];
      cd.appendChild(n); cd.appendChild(l); sg.appendChild(cd);
    });
    app.appendChild(sg);

    var tb = document.createElement("div"); tb.className = "tab-bar";
    var tabs = document.createElement("div"); tabs.className = "tabs";
    [["best","模範行動"],["ng","NG行動"],["manual","マニュアル"],["email","メールテンプレート"],["insights","インサイト"]].forEach(function(item) {
      var t = document.createElement("button"); t.className = "tab" + (S.tab === item[0] ? " active" : ""); t.textContent = item[1];
      (function(id){ t.onclick = function() { setState({ tab: id }); }; })(item[0]);
      tabs.appendChild(t);
    });
    var pdfBtn = document.createElement("button"); pdfBtn.className = "pdf-btn";
    pdfBtn.textContent = S.pdfLoading ? "生成中..." : "↓ PDFで書き出す";
    if (!S.pdfLoading) pdfBtn.onclick = exportPDF;
    tb.appendChild(tabs); tb.appendChild(pdfBtn); app.appendChild(tb);

    var content = document.createElement("div");
    if (S.tab === "best") (r.best_practices||[]).forEach(function(b) {
      var it = document.createElement("div"); it.className = "item"; it.style.borderLeft = "2px solid #1D9E75";
      var title = document.createElement("p"); title.className = "item-title"; title.textContent = b.title;
      var desc = document.createElement("p"); desc.className = "item-desc"; desc.textContent = b.description;
      it.appendChild(title); it.appendChild(desc);
      if (b.evidence) { var ev = document.createElement("span"); ev.className = "badge bg"; ev.textContent = "根拠: " + b.evidence; it.appendChild(ev); }
      content.appendChild(it);
    });
    if (S.tab === "ng") (r.ng_practices||[]).forEach(function(n) {
      var it = document.createElement("div"); it.className = "item"; it.style.borderLeft = "2px solid #E24B4A";
      var title = document.createElement("p"); title.className = "item-title"; title.textContent = n.title;
      var desc = document.createElement("p"); desc.className = "item-desc"; desc.textContent = n.description;
      it.appendChild(title); it.appendChild(desc);
      if (n.evidence) { var ev = document.createElement("span"); ev.className = "badge br"; ev.textContent = "根拠: " + n.evidence; it.appendChild(ev); }
      if (n.risk) { var rp = document.createElement("p"); rp.className = "risk"; rp.textContent = "リスク: " + n.risk; it.appendChild(rp); }
      content.appendChild(it);
    });
    if (S.tab === "manual") (r.manual_sections||[]).forEach(function(s, i) {
      var it = document.createElement("div"); it.className = "item";
      var title = document.createElement("p"); title.className = "item-title"; title.textContent = (i+1) + ". " + s.title;
      var desc = document.createElement("p"); desc.className = "item-desc"; desc.textContent = s.content;
      it.appendChild(title); it.appendChild(desc); content.appendChild(it);
    });
    if (S.tab === "email") (r.email_templates||[]).forEach(function(e) {
      var it = document.createElement("div"); it.className = "item"; it.style.borderLeft = "2px solid #185FA5";
      var title = document.createElement("p"); title.className = "item-title"; title.textContent = e.title;
      it.appendChild(title);
      if (e.point) { var pt = document.createElement("p"); pt.style.cssText = "font-size:12px;color:#185FA5;margin-bottom:8px"; pt.textContent = "💡 " + e.point; it.appendChild(pt); }
      var subj = document.createElement("div"); subj.style.cssText = "background:#f5f4f0;border-radius:6px;padding:8px 12px;margin-bottom:8px";
      var subjLabel = document.createElement("p"); subjLabel.style.cssText = "font-size:11px;color:#888;margin-bottom:2px"; subjLabel.textContent = "件名";
      var subjText = document.createElement("p"); subjText.style.cssText = "font-size:13px;font-weight:500"; subjText.textContent = e.subject;
      subj.appendChild(subjLabel); subj.appendChild(subjText); it.appendChild(subj);
      var body = document.createElement("div"); body.style.cssText = "background:#f5f4f0;border-radius:6px;padding:8px 12px";
      var bodyLabel = document.createElement("p"); bodyLabel.style.cssText = "font-size:11px;color:#888;margin-bottom:4px"; bodyLabel.textContent = "本文";
      var bodyText = document.createElement("p"); bodyText.style.cssText = "font-size:12px;line-height:1.8;white-space:pre-wrap"; bodyText.textContent = e.body;
      body.appendChild(bodyLabel); body.appendChild(bodyText); it.appendChild(body);
      content.appendChild(it);
    });
    
    if (S.tab === "insights") {
      var ic = document.createElement("div"); ic.className = "card";
      var il = document.createElement("p"); il.className = "card-label"; il.textContent = "組織改善インサイト";
      var it2 = document.createElement("p"); it2.className = "summary-text"; it2.textContent = r.insights;
      ic.appendChild(il); ic.appendChild(it2); content.appendChild(ic);
    }
    app.appendChild(content);
  }
}

render();
</script>
</body>
</html>
